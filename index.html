<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <title>Morse Sender</title>
    <style>
        /* 見た目を整えるCSS */
        body {
            background-color: #1a1a1a; /* ダークな背景 */
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            margin: 0;
            font-family: sans-serif;
            color: white;
        }
        #status { margin-bottom: 20px; color: #888; }
        
        /* 中央の大きなボタン */
        #morseButton {
            width: 200px;
            height: 200px;
            background: radial-gradient(#ff4b2b, #ff416c); /* 赤いグラデーション */
            border: none;
            border-radius: 50%; /* 丸くする */
            box-shadow: 0 0 20px rgba(255, 75, 43, 0.5);
            color: white;
            font-size: 24px;
            font-weight: bold;
            outline: none;
            -webkit-tap-highlight-color: transparent; /* タップ時の青枠を消す */
        }
        
        /* 押した時の見た目 */
        #morseButton:active {
            transform: scale(0.95); /* 少しへこむ */
            box-shadow: 0 0 40px rgba(255, 75, 43, 0.8);
            filter: brightness(1.2);
        }

        .connect-btn {
            margin-top: 50px;
            padding: 10px 20px;
            background: #444;
            border: 1px solid #666;
            color: white;
            border-radius: 5px;
        }
    </style>
</head>
<body>

    <div id="status">切断中</div>
    <button id="morseButton">PUSH</button>
    <button class="connect-btn" onclick="connect()">接続開始</button>

    <script>
        let charac;
        const statusText = document.getElementById('status');

        async function connect() {
            try {
                const device = await navigator.bluetooth.requestDevice({
                    filters: [{ name: 'WebMorseR4' }],
                    optionalServices: ['19B10000-E8F2-537E-4F6C-D104768A1214']
                });
                const server = await device.gatt.connect();
                const service = await server.getPrimaryService('19B10000-E8F2-537E-4F6C-D104768A1214');
                charac = await service.getCharacteristic('19B10001-E8F2-537E-4F6C-D104768A1214');
                statusText.innerText = "接続完了！";
                statusText.style.color = "#00ff00";
            } catch (err) {
                console.error(err);
                alert("接続に失敗しました");
            }
        }

        const btn = document.getElementById('morseButton');
        // スマホのタッチ操作に対応
        btn.onpointerdown = (e) => {
            e.preventDefault();
            if(charac) charac.writeValue(new Uint8Array([1]));
        };
        btn.onpointerup = (e) => {
            e.preventDefault();
            if(charac) charac.writeValue(new Uint8Array([0]));
        };
    </script>
</body>
</html>
